<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Group Buy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="group.css">
</head>

<body>

<div class="top-bar">
    <div class="logo">GroupCart</div>
    <button class="back-btn" onclick="goBack()">⬅ Go Back</button>
    <button class="login-btn" onclick="goToLogin()">Login</button>
</div>

<div class="container">
    <h2>🔥 Active Group Buys</h2>
    <div id="groupList" class="products-container"></div>
</div>

<h2>Group Buy</h2>
<h3 id="productName"></h3>

<div class="circle-timer">
    <svg>
        <circle class="bg-circle" cx="75" cy="75" r="70"></circle>
        <circle class="progress-circle" id="progress" cx="75" cy="75" r="70"></circle>
    </svg>
    <div id="timerText">02:00:00</div>
</div>

<div id="gr1">
<p id="originalPrice"></p>
<p id="discount"></p>
<p id="members">Members joined: 0/3</p>

<button id="inviteBtn">Invite via WhatsApp</button>
<button id="joinBtn">Join Group</button>
<button id="checkoutBtn" onclick="checkout()">Checkout</button>
</div>
</div>

<script>

/* =========================
   BASIC NAV
========================= */
function goBack(){
    if (window.history.length > 1) window.history.back();
    else window.location.href = "products.html";
}
function goToLogin(){
    window.location.href = "login.html";
}

/* =========================
   CHECK MODE
========================= */
const groupId = new URLSearchParams(window.location.search).get("groupId");

/* =========================
   MULTIPLE GROUPS VIEW
========================= */
async function loadAllGroups(){

    const res = await fetch("https://ecommerce-backend-yx51.onrender.com/all-groups");
    const data = await res.json();

    if(!data.success) return;

    const container = document.getElementById("groupList");
    container.innerHTML = "";

    data.groups.forEach(group => {

        if(group.status !== "pending") return;

        const created = new Date(group.created_at).getTime();
        const end = created + (2 * 60 * 60 * 1000);

        const card = document.createElement("div");
        card.className = "group-card";

        card.innerHTML = `
            <h3>${group.product_name}</h3>

            <p>Original: ₹${group.product_price}</p>
            <p>Offer: ₹${Math.round(group.product_price * 0.7)}</p>

            <p id="timer-${group.id}">Loading...</p>

            <button onclick="viewGroup(${group.id})">View</button>
        `;

        container.appendChild(card);

        startMiniTimer(group.id, end);
    });
}

/* =========================
   MINI TIMER (CARD)
========================= */
function startMiniTimer(id, endTime){

    setInterval(() => {

        const diff = endTime - Date.now();

        if(diff <= 0){
            document.getElementById("timer-" + id).innerText = "Expired";
            return;
        }

        const mins = Math.floor(diff / (1000 * 60));
        const secs = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("timer-" + id).innerText =
            mins + "m " + secs + "s left";

    }, 1000);
}

/* =========================
   VIEW BUTTON
========================= */
function viewGroup(id){
    window.location.href = `group.html?groupId=${id}`;
}

/* =========================
   SINGLE GROUP (YOUR OLD LOGIC)
========================= */

let productId = null;

async function loadGroup(){

const res = await 
fetch(`https://ecommerce-backend-yx51.onrender.com/group-status/${groupId}`);
const data = await res.json();

if(!data.success) return;

const group = data.group;
const members = group.members || [];

productId = group.product_id;

document.getElementById("productName").innerText = group.product_name;

const originalPrice = Number(group.product_price);
const finalPrice = Math.round(originalPrice * 0.7);

document.getElementById("discount").innerText = "Pay: ₹" + finalPrice;
document.getElementById("originalPrice").innerText = "Original Price: ₹" + originalPrice;
document.getElementById("members").innerText = `Members joined: ${members.length}/3`;

const created = new Date(group.created_at).getTime();
const endTime = created + (2 * 60 * 60 * 1000);

startTimer(endTime);
}

/* =========================
   TIMER (MAIN)
========================= */
function startTimer(endTime){

setInterval(() => {

const diff = endTime - Date.now();

if(diff <= 0){
    document.getElementById("timerText").innerText = "Expired";
    return;
}

const hrs = Math.floor(diff / (1000 * 60 * 60));
const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
const secs = Math.floor((diff % (1000 * 60)) / 1000);

document.getElementById("timerText").innerText =
`${hrs}:${mins}:${secs}`;

}, 1000);
}

/* =========================
   INIT
========================= */
if(groupId){
    document.getElementById("card").style.display = "block";
    document.getElementById("groupList").style.display = "none";
    loadGroup();
}else{
    loadAllGroups();
}

</script>

</body>
</html>
