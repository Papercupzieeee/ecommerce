<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Group Buy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="group.css">
</head>

<body>

<!-- 🎉 SUCCESS POPUP -->
<div id="successPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:9999;">
  <div style="background:white; padding:25px; border-radius:15px; text-align:center; width:320px;">
    <div style="font-size:40px;">🎉🎊🥳</div>
    <h2>Congratulations!</h2>
    <p>You unlocked Group Discount 🛍️</p>
    <p style="font-style:italic;">"Great things happen when people shop together!"</p>

    <button onclick="goToCheckout()" style="background:green; color:white; padding:10px; margin:5px; border:none; border-radius:5px;">
      Checkout
    </button>

    <button onclick="closePopup()" style="background:red; color:white; padding:10px; margin:5px; border:none; border-radius:5px;">
      Exit
    </button>
  </div>
</div>

<div class="top-bar">
    <div class="logo">GroupCart</div>
    <button onclick="goBack()">⬅ Go Back</button>
    <button onclick="goToLogin()">Login</button>
</div>

<!-- MULTIPLE GROUPS -->
<div class="container" id="listSection">
    <h2>🔥 Active Group Buys</h2>
    <div id="groupList" class="products-container"></div>
</div>

<!-- SINGLE GROUP -->
<div class="container" id="singleSection" style="display:none;">
    <h2 id="productName"></h2>
    <div class="circle">
        <div id="timerText">00:00:00</div>
    </div>
    <p id="originalPrice"></p>
    <p id="discountPrice"></p>
    <p id="members">Members: 0</p>
    <button id="joinBtn">Join Group</button>
</div>

<script>

/* NAV */
function goBack(){ window.history.back(); }
function goToLogin(){ window.location.href="login.html"; }

/* POPUP */
function showSuccessPopup(){
  document.getElementById("successPopup").style.display = "flex";
}
function closePopup(){
  document.getElementById("successPopup").style.display = "none";
}
function goToCheckout(){
  window.location.href = "checkout.html";
}

/* MAIN */
const groupId = new URLSearchParams(window.location.search).get("groupId");

/* LOAD ALL GROUPS */
async function loadAllGroups(){
    try{
        const res = await fetch("https://ecommerce-backend-yx51.onrender.com/all-groups");
        const data = await res.json();

        if(!data.success) return;

        const container = document.getElementById("groupList");
        container.innerHTML = "";

        data.groups.forEach(group => {
            if(group.status!=='pending') return;

            const created = new Date(group.created_at).getTime();
            const end = created + 2*60*60*1000;

            const card = document.createElement("div");
            card.className = "group-card";

            card.innerHTML = `
                <h3>${group.product_name}</h3>
                <p>Original: ₹${group.product_price}</p>
                <p>Offer: ₹${Math.round(group.product_price*0.7)}</p>
                <p id="timer-${group.group_id}">Loading...</p>
                <button onclick="viewGroup('${group.group_id}')">View</button>
            `;

            container.appendChild(card);
            startMiniTimer(group.group_id, end);
        });

        if(container.innerHTML==="") container.innerHTML="<p>No active group buys 😢</p>";

    }catch(err){ console.error(err); }
}

/* MINI TIMER */
function startMiniTimer(id, endTime){
    const interval = setInterval(()=>{
        const diff = endTime - Date.now();
        if(diff<=0){
            document.getElementById("timer-"+id).innerText="Expired";
            clearInterval(interval);
            return;
        }
        const mins=Math.floor(diff/(1000*60));
        const secs=Math.floor((diff%(1000*60))/1000);
        document.getElementById("timer-"+id).innerText=mins+"m "+secs+"s";
    },1000);
}

/* VIEW GROUP */
function viewGroup(id){
    window.location.href=`group.html?groupId=${id}`;
}

/* LOAD SINGLE GROUP */
async function loadGroup(){
    try{
        const res = await fetch(`https://ecommerce-backend-yx51.onrender.com/group-status/${groupId}`);
        const data = await res.json();

        if(!data.success){
            alert(data.message||"Failed to load group");
            return;
        }

        const group = data.group;

        document.getElementById("productName").innerText = group.product_name;
        document.getElementById("originalPrice").innerText = "Original: ₹"+group.product_price;
        document.getElementById("discountPrice").innerText =
            "Offer: ₹" + Math.round(group.product_price * 0.7);

        const memberCount = group.members ? group.members.length : 0;
        document.getElementById("members").innerText = "Members: " + memberCount;

        // 🎉 already full → show popup
        if(memberCount >= 3){
            showSuccessPopup();
            document.getElementById("joinBtn").disabled = true;
        }

        const created = new Date(group.created_at).getTime();
        startMainTimer(created + 2*60*60*1000);

    }catch(err){ console.error(err); }
}

/* MAIN TIMER */
function startMainTimer(endTime){
    const interval = setInterval(()=>{
        const diff = endTime - Date.now();
        if(diff<=0){
            document.getElementById("timerText").innerText="Expired";
            clearInterval(interval);
            return;
        }
        const h=Math.floor(diff/(1000*60*60));
        const m=Math.floor((diff%(1000*60*60))/(1000*60));
        const s=Math.floor((diff%(1000*60))/1000);

        document.getElementById("timerText").innerText =
            String(h).padStart(2,'0')+":"+
            String(m).padStart(2,'0')+":"+
            String(s).padStart(2,'0');
    },1000);
}

/* INIT */
if(groupId){
    document.getElementById("listSection").style.display="none";
    document.getElementById("singleSection").style.display="block";
    loadGroup();
} else {
    loadAllGroups();
}

/* JOIN GROUP */
const joinBtn = document.getElementById("joinBtn");

if (joinBtn) {
  joinBtn.addEventListener("click", async () => {

    let memberName = prompt("Enter your name:");
    if (!memberName || !memberName.trim()) {
      alert("Name is required!");
      return;
    }

    memberName = memberName.trim();

    try {
      const res = await fetch("https://ecommerce-backend-yx51.onrender.com/join-group", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          group_id: parseInt(groupId),
          memberName
        })
      });

      const data = await res.json();

      if (data.success) {

        document.getElementById("members").innerText = "Members: " + data.members;

        if (parseInt(data.members) >= 3) {
          showSuccessPopup();
          joinBtn.disabled = true;
        } else {
          alert(`Joined! Members now: ${data.members}`);
        }

      } else {
        alert(data.message || "Failed to join");
      }

    } catch (err) {
      console.error(err);
      alert("Server error");
    }
  });
}

</script>

</body>
</html>
