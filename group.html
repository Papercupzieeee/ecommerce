<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Group Buy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="group.css">
</head>

<body>

<div class="top-bar">
    <div class="logo">GroupCart</div>
    <button onclick="goBack()">⬅ Go Back</button>
    <button onclick="goToLogin()">Login</button>
</div>

<!-- 🔥 MULTIPLE GROUPS -->
<div class="container" id="listSection">
    <h2>🔥 Active Group Buys</h2>
    <div id="groupList" class="products-container"></div>
</div>

<!-- 🎯 SINGLE GROUP -->
<div class="container" id="singleSection" style="display:none;">
    <h2 id="productName"></h2>

    <div class="circle">
        <div id="timerText">00:00:00</div>
    </div>

    <p id="originalPrice"></p>
    <p id="discount"></p>
    <p id="members"></p>

    <button id="joinBtn">Join Group</button>
</div>

<script>

/* NAV */
function goBack(){
    window.history.back();
}
function goToLogin(){
    window.location.href="login.html";
}

/* MODE */
const groupId = new URLSearchParams(window.location.search).get("groupId");

/* ================= MULTIPLE GROUPS ================= */

async function loadAllGroups(){

    const res = await fetch("https://ecommerce-backend-yx51.onrender.com/all-groups");
    const data = await res.json();

    if(!data.success) return;

    const container = document.getElementById("groupList");
    container.innerHTML = "";

    data.groups.rows.forEach(group => {
        if(group.status !== "pending") return;

        const created = new Date(group.created_at).getTime();
        const end = created + (2 * 60 * 60 * 1000);

        const card = document.createElement("div");
        card.className = "group-card";

        card.innerHTML = `
            <h3>${group.product_name}</h3>
            <p>Original: ₹${group.product_price}</p>
            <p>Offer: ₹${Math.round(group.product_price * 0.7)}</p>
            <p id="timer-${group.id}">Loading...</p>
            <button onclick="viewGroup(${group.id})">View</button>
        `;

        container.appendChild(card);

        startMiniTimer(group.id, end);
    });
}

/* TIMER CARD */
function startMiniTimer(id, endTime){

    const interval = setInterval(() => {

        const diff = endTime - Date.now();

        if(diff <= 0){
            document.getElementById("timer-" + id).innerText = "Expired";
            clearInterval(interval); // 🔥 important
            return;
        }

        const mins = Math.floor(diff / (1000 * 60));
        const secs = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("timer-" + id).innerText =
            mins + "m " + secs + "s";

    },1000);
}

/* VIEW */
function viewGroup(groupId){
    window.location.href = `group.html?groupId=${groupId}`;
}

/* ================= SINGLE GROUP ================= */

async function loadGroup(){

    const res = await fetch(`https://ecommerce-backend-yx51.onrender.com/group-status/${groupId}`);
    const data = await res.json();

    if(!data.success) return;

    const group = data.group;
    const members = group.members || [];

    document.getElementById("productName").innerText = group.product_name;

    const original = Number(group.product_price);
    const offer = Math.round(original * 0.7);

    document.getElementById("originalPrice").innerText = "Original: ₹" + original;
    document.getElementById("discount").innerText = "Offer: ₹" + offer;
    document.getElementById("members").innerText = `Members: ${members.length}/3`;

    const created = new Date(group.created_at).getTime();
    const endTime = created + (2 * 60 * 60 * 1000);

    startMainTimer(endTime);
}

/* TIMER MAIN */
function startMainTimer(endTime){

    const interval = setInterval(() => {

        const diff = endTime - Date.now();

        if(diff <= 0){
            document.getElementById("timerText").innerText = "Expired";
            clearInterval(interval); // 🔥 important
            return;
        }

        const h = Math.floor(diff/(1000*60*60));
        const m = Math.floor((diff%(1000*60*60))/(1000*60));
        const s = Math.floor((diff%(1000*60))/1000);

        document.getElementById("timerText").innerText =
            String(h).padStart(2,'0') + ":" +
            String(m).padStart(2,'0') + ":" +
            String(s).padStart(2,'0');

    }, 1000);
}
if(container.innerHTML === ""){
    container.innerHTML = "<p>No active group buys 😢</p>";
}

/* INIT */
if(groupId){
    document.getElementById("listSection").style.display="none";
    document.getElementById("singleSection").style.display="block";
    loadGroup();
}else{
    loadAllGroups();
}

</script>

</body>
</html>
