<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Women's Wear</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="products.css">
</head>

<body id="fourbody">

<div class="box4">
    <p class="text4a"><span id="g">G</span>roupcart</p>
    <div class="header-btns">
        <button id="logoutbtn" onclick="logout()">Logout</button>
        <button class="cart-btn" onclick="location.href='checkout.html'">🛒 Cart</button>
        <button id="myGroupBtn" onclick="openMyGroup()">👥 My Group</button>
    </div>
</div>

<div class="box4d">
    <a class="link1" href="products.html">Women's wear</a>
    <a class="link2" href="toy.html">Toys</a>
    <a class="link3" href="shoes.html">Shoes</a>
    <a class="link4" href="laptop.html">Laptops</a>
</div>

<div class="products-container">

    <!-- HALF SAREE -->
    <div class="product-card">
        <div class="discount-ribbon" id="offer-201"></div>
        <a href="product-detail.html?product=half"><img src="half1.jpg" class="product-img"></a>
        <p class="product-name">Half Saree</p>
        <p id="price-201">
            <span class="original-price">₹1999</span>
            <span class="final-price"></span>
        </p>
        <button class="cartbtn" onclick="addToCart(201,'Half Saree')">Add to Cart</button>
        <button class="groupbuy" onclick="goToGroupBuyByData(201,'Half Saree',1999)">GroupBuy</button>
    </div>

    <!-- MAXI -->
    <div class="product-card">
        <div class="discount-ribbon" id="offer-202"></div>
        <a href="product-detail.html?product=ko"><img src="ko1.jpg" class="product-img"></a>
        <p class="product-name">Maxi</p>
        <p id="price-202">
            <span class="original-price">₹1499</span>
            <span class="final-price"></span>
        </p>
        <button class="cartbtn" onclick="addToCart(202,'Kurti Set')">Add to Cart</button>
        <button class="groupbuy" onclick="goToGroupBuyByData(202,'Kurti Set',1499)">GroupBuy</button>
    </div>

    <!-- BABY DRESS -->
    <div class="product-card">
        <div class="discount-ribbon" id="offer-203"></div>
        <a href="product-detail.html?product=baby"><img src="baby1.jpg" class="product-img"></a>
        <p class="product-name">Baby Dress</p>
        <p id="price-203">
            <span class="original-price">₹999</span>
            <span class="final-price"></span>
        </p>
        <button class="cartbtn" onclick="addToCart(203,'Baby Dress')">Add to Cart</button>
        <button class="groupbuy" onclick="goToGroupBuyByData(203,'Baby Dress',999)">GroupBuy</button>
    </div>

    <!-- LEHENGA -->
    <div class="product-card">
        <div class="discount-ribbon" id="offer-204"></div>
        <a href="product-detail.html?product=leh"><img src="leh1.jpg" class="product-img"></a>
        <p class="product-name">Lehenga</p>
        <p id="price-204">
            <span class="original-price">₹2999</span>
            <span class="final-price"></span>
        </p>
        <button class="cartbtn" onclick="addToCart(204,'Lehenga')">Add to Cart</button>
        <button class="groupbuy" onclick="goToGroupBuyByData(204,'Lehenga',2999)">GroupBuy</button>
    </div> 
</div>

<script>
/* ---------------- LOGOUT ---------------- */
function logout(){
    const userId = localStorage.getItem("userId");
    localStorage.removeItem("group_" + userId);
    localStorage.removeItem("userId");
    window.location.href = "login.html";
}

/* ---------------- GROUP BUY ---------------- */
async function goToGroupBuyByData(productId, productName, productPrice){
  const btn = event.target;
  btn.disabled=true;
  const userId = localStorage.getItem("userId");
  if(!userId){ alert("Login first!"); btn.disabled=false; return; }

  try{
    const res = await fetch("https://ecommerce-backend-yx51.onrender.com/create-group", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ productId, productName, productPrice, userId })
});
    const data = await res.json();
    if(data.success){
      localStorage.setItem("group_" + userId, data.groupId);
      window.location.href=`group.html?groupId=${data.groupId}`;
    }else{
      alert(data.message || "Failed to create group");
      btn.disabled=false;
    }
  }catch(err){ console.error(err); alert("Server error"); btn.disabled=false;}
}
/* ---------------- ADD TO CART ---------------- */
function addToCart(id, name){
    let priceElement = document.getElementById("price-" + id);
    let originalPrice = Number(priceElement.querySelector(".original-price").innerText.replace("₹",""));
    let finalPrice = Number(priceElement.querySelector(".final-price").innerText.replace("₹","")) || originalPrice;
    let discount = originalPrice - finalPrice;

    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let existing = cart.find(item => item.productId === Number(id));

    if(existing) existing.quantity += 1;
    else cart.push({ productId: id, name, price: finalPrice, originalPrice, discount, quantity:1 });

    localStorage.setItem("cart", JSON.stringify(cart));
    alert(name + " added to cart");
}

/* ---------------- DISTRICT OFFER LOGIC ---------------- */
let offers = { "Chennai": {type:"percentage", value:10}, "Coimbatore":{type:"percentage", value:30}, "Madurai":{type:"cash", value:100} };
let userDistrict = localStorage.getItem("district");
let districtOffer = offers[userDistrict];

[201,202,203,204].forEach(id => {
    let priceElement = document.getElementById("price-" + id);
    let ribbon = document.getElementById("offer-" + id);
    let originalPrice = Number(priceElement.querySelector(".original-price").innerText.replace("₹",""));
    let finalPrice = originalPrice;

    if(districtOffer){
        if(districtOffer.type==="percentage") finalPrice = originalPrice - (originalPrice*districtOffer.value/100);
        if(districtOffer.type==="cash") finalPrice = originalPrice - districtOffer.value;
        ribbon.innerText = districtOffer.type==="percentage"? districtOffer.value+"% OFF":"₹"+districtOffer.value+" OFF";
        ribbon.style.display="block";
    }

    priceElement.querySelector(".final-price").innerText = "₹"+Math.round(finalPrice);
});

/* ---------------- MY GROUP ---------------- */
function openMyGroup(){
    const userId = localStorage.getItem("userId");
    const groupId = localStorage.getItem("group_" + userId);
    if(!groupId) { alert("No active group"); return; }
    window.location.href = `group.html?groupId=${groupId}`;
}

/* ---------------- SHOW MY GROUP BUTTON ---------------- */
window.addEventListener("load", ()=>{
    const userId = localStorage.getItem("userId");
    const groupId = localStorage.getItem("group_" + userId);
    const btn = document.getElementById("myGroupBtn");
    btn.style.display = groupId ? "block":"none";
});
</script>

</body>
</html>
