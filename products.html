<script>

/* ---------------- ADD TO CART ---------------- */

function addToCart(id, name, price){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existing = cart.find(item => item.productId === Number(id));

    if(existing){
        existing.quantity += 1;
    } else {
        cart.push({
            productId: Number(id),
            name: name,
            price: Number(price),
            quantity: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    alert(name + " added to cart");
}


/* ---------------- GROUP BUY ---------------- */

function goToGroupBuyByData(productName, productPrice){

    fetch("http://localhost:3000/create-group", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ productName, productPrice })
    })
    .then(res => res.json())
    .then(data => {

        if(data.success){
            location.href = `group.html?groupId=${data.groupId}`;
        } else {
            alert("Group creation failed");
        }

    })
    .catch(err => {
        console.error(err);
        alert("Server error");
    });
}


/* ---------------- DISTRICT OFFER LOGIC ---------------- */

// IMPORTANT: signup time la district save pannirukanum
// localStorage.setItem("district", userDistrict)

let userDistrict = localStorage.getItem("district");

/* Sample district offers (match with backend) */
let offers = {
    "Chennai": { type: "percentage", value: 10 },
    "Coimbatore": { type: "percentage", value: 15 },
    "Madurai": { type: "cash", value: 200 }
};

let districtOffer = offers[userDistrict];

if(districtOffer){

    [201,202,203,204].forEach(id => {

        let priceElement = document.getElementById("price-" + id);
        let ribbon = document.getElementById("offer-" + id);

        let originalPrice = Number(priceElement.innerText.replace("₹",""));
        let finalPrice = originalPrice;

        if(districtOffer.type === "percentage"){
            finalPrice = originalPrice - (originalPrice * districtOffer.value / 100);
            ribbon.innerText = districtOffer.value + "% OFF";
        }

        if(districtOffer.type === "cash"){
            finalPrice = originalPrice - districtOffer.value;
            ribbon.innerText = "₹" + districtOffer.value + " OFF";
        }

        priceElement.innerText = "₹" + Math.round(finalPrice);

        ribbon.style.display = "block";

    });

}


</script>
