<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laptops - Groupcart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="products.css">
</head>

<body id="fourbody">

<div class="box4">
    <a href="homepage.html" class="text4a">
        Groupcart <span>Plus ✦</span>
    </a>
    <div class="header-btns">
        <button class="cart-btn" onclick="location.href='checkout.html'">🛒 Cart</button>
        <button id="myGroupBtn" onclick="openMyGroup()" style="display:none;">👥 Groups</button>
        <button id="logoutbtn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="box4d">
    <a href="products.html">Women</a>
    <a href="toy.html">Toys</a>
    <a href="shoes.html">Shoes</a>
    <a href="laptop.html" style="color: #2874f0; border-bottom: 2px solid #2874f0;">Laptops</a>
</div>

<div class="products-container">

    <div class="product-card">
        <a href="laptop-detail.html?product=laptop">
            <img src="laptop1.jpg" class="product-img">
        </a>
        <p class="product-name">DELL Inspiron Intel Core i5</p>
        <div class="price-section">
            <p id="price-200">
                <span class="final-price"></span>
                <span class="original-price">₹59999</span>
            </p>
            <div class="discount-ribbon" id="offer-200"></div>
        </div>
        <button class="cartbtn" onclick="addToCart(200,'DELL Laptop')">Add to Cart</button>
        <button class="groupbuy" onclick="goToGroupBuyByData(200,'DELL Laptop')">Group Buy</button>
    </div>

    <div class="product-card">
        <a href="laptop-detail.html?product=samsung">
            <img src="el1.jpg" class="product-img">
        </a>
        <p class="product-name">Samsung Galaxy A30s (Prism)</p>
        <div class="price-section">
            <p id="price-216">
                <span class="final-price"></span>
                <span class="original-price">₹19999</span>
            </p>
            <div class="discount-ribbon" id="offer-216"></div>
        </div>
        <button class="cartbtn" onclick="addToCart(216,'Samsung A30s')">Add to Cart</button>
        <button class="groupbuy" onclick="goToGroupBuyByData(216,'Samsung A30s')">Group Buy</button>
    </div>

    <div class="product-card">
        <a href="laptop-detail.html?product=fan">
            <img src="fan1.jpg" class="product-img">
        </a>
        <p class="product-name">Usha High Speed Tower Fan</p>
        <div class="price-section">
            <p id="price-217">
                <span class="final-price"></span>
                <span class="original-price">₹1499</span>
            </p>
            <div class="discount-ribbon" id="offer-217"></div>
        </div>
        <button class="cartbtn" onclick="addToCart(217,'Usha Fan')">Add to Cart</button>
        <button class="groupbuy" onclick="goToGroupBuyByData(217,'Usha Fan')">Group Buy</button>
    </div>

</div>

<script>

/* LOGOUT */
function logout(){
    const userId = localStorage.getItem("userId");
    localStorage.removeItem("group_" + userId);
    localStorage.removeItem("userId");
    window.location.href = "index.html";
}

/* GROUP BUY (FINAL FIX) */
function goToGroupBuyByData(productId, productName){

    const userId = localStorage.getItem("userId");

    if(!userId){
        alert("Login first");
        window.location.href = "login.html";
        return;
    }

    let priceElement = document.getElementById("price-" + productId);

    let originalPrice = Number(
        priceElement.querySelector(".original-price").innerText.replace("₹","")
    );

    let finalText = priceElement.querySelector(".final-price").innerText;

    let finalPrice = finalText
        ? Number(finalText.replace("₹",""))
        : originalPrice;

    const existingGroup = localStorage.getItem("group_" + userId);

    if(existingGroup){

        fetch(`https://ecommerce-backend-yx51.onrender.com/group-status/${existingGroup}`)
        .then(res => res.json())
        .then(data => {

            if(!data.success || data.group.status !== "pending"){
                localStorage.removeItem("group_" + userId);
                createGroup();
                return;
            }

            window.location.href = `group.html?groupId=${existingGroup}`;

        })
        .catch(() => {
            localStorage.removeItem("group_" + userId);
            createGroup();
        });

        return;
    }

    createGroup();

    function createGroup(){

        fetch("https://ecommerce-backend-yx51.onrender.com/create-group", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                productId,
                productName,
                productPrice: finalPrice,
                userId
            })
        })
        .then(res => res.json())
        .then(data => {

            if(data.success){
                localStorage.setItem("group_" + userId, data.groupId);
                window.location.href = `group.html?groupId=${data.groupId}`;
            } else {
                alert("Failed to create group");
            }

        })
        .catch(() => alert("Server error"));
    }
}

/* ADD TO CART */
function addToCart(id, name){

    let priceElement = document.getElementById("price-" + id);

    let originalPrice = Number(priceElement.querySelector(".original-price").innerText.replace("₹",""));
    let finalPrice = priceElement.querySelector(".final-price").innerText
        ? Number(priceElement.querySelector(".final-price").innerText.replace("₹",""))
        : originalPrice;

    let discount = originalPrice - finalPrice;

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existing = cart.find(item => item.productId === Number(id));

    if(existing) existing.quantity += 1;
    else cart.push({ productId:id, name, price:finalPrice, originalPrice, discount, quantity:1 });

    localStorage.setItem("cart", JSON.stringify(cart));
    alert(name + " added to cart 🛒");
}

/* DISTRICT OFFER */
let offers = {
    "Chennai": {type:"percentage", value:10},
    "Coimbatore": {type:"percentage", value:30},
    "Madurai": {type:"cash", value:100}
};

let userDistrict = localStorage.getItem("district");
let districtOffer = offers[userDistrict];

[200,216,217].forEach(id => {

    let priceElement = document.getElementById("price-" + id);
    let ribbon = document.getElementById("offer-" + id);

    let originalPrice = Number(priceElement.querySelector(".original-price").innerText.replace("₹",""));
    let finalPrice = originalPrice;

    if(districtOffer){
        if(districtOffer.type==="percentage"){
            finalPrice = originalPrice - (originalPrice * districtOffer.value / 100);
            ribbon.innerText = districtOffer.value + "% OFF";
        }
        if(districtOffer.type==="cash"){
            finalPrice = originalPrice - districtOffer.value;
            ribbon.innerText = "₹" + districtOffer.value + " OFF";
        }
        ribbon.style.display="block";
    }

    priceElement.querySelector(".final-price").innerText = "₹" + Math.round(finalPrice);
});

/* MY GROUP */
function openMyGroup(){
    const userId = localStorage.getItem("userId");
    const groupId = localStorage.getItem("group_" + userId);
    if(!groupId){ alert("No active group"); return; }
    window.location.href = `group.html?groupId=${groupId}`;
}

/* SHOW BUTTON */
window.addEventListener("load", ()=>{
    const userId = localStorage.getItem("userId");
    const groupId = localStorage.getItem("group_" + userId);
    document.getElementById("myGroupBtn").style.display = groupId ? "block":"none";
});

</script>

</body>
</html>
