<script>

/* ADD TO CART */

function addToCart(id,name,price){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let existing = cart.find(item => item.productId === Number(id));

if(existing){
existing.quantity += 1;
}
else{
cart.push({
productId:Number(id),
name:name,
price:Number(price),
quantity:1
});
}

localStorage.setItem("cart",JSON.stringify(cart));
alert(name + " added to cart");

}


/* GROUP BUY */

function goToGroupBuyByData(productName,productPrice){

fetch("http://localhost:3000/create-group",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({productName,productPrice})
})
.then(res=>res.json())
.then(data=>{
if(data.success){
location.href=`group.html?groupId=${data.groupId}`;
}
else{
alert("Group creation failed");
}
})
.catch(()=>{
alert("Server error");
});

}

</script>
