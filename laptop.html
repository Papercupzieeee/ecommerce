<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Laptops</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="products.css">
</head>

<body id="fourbody">

<div class="box4">
<p class="text4a"><span id="g">G</span>roupcart</p>

<button id="logoutbtn" onclick="logout()">Logout</button>

<button class="cart-btn" onclick="location.href='checkout.html'">
🛒 Cart
</button>

<button id="myGroupBtn" onclick="openMyGroup()">
👥 My Group
</button>
</div>

<div class="box4d">
<a class="link1" href="products.html">Women's wear</a>
<a class="link2" href="toy.html">Toys</a>
<a class="link3" href="shoes.html">Shoes</a>
<a class="link4" href="laptop.html">Laptops</a>
</div>

<div class="products-container">

<!-- DELL -->
<div class="product-card">
<div class="discount-ribbon" id="offer-200"></div>

<a href="laptop-detail.html?product=laptop">
<img src="laptop1.jpg" class="product-img">
</a>

<p class="product-name">DELL Laptop</p>

<p id="price-200">
    <span class="original-price">₹59999</span>
    <span class="final-price"></span>
</p>

<button class="cartbtn" onclick="addToCart(200,'DELL Laptop')">Add to Cart</button>
<button class="groupbuy" onclick="goToGroupBuyByData(200,'DELL Laptop',59999)">GroupBuy</button>
</div>

<!-- SAMSUNG -->
<div class="product-card">
<div class="discount-ribbon" id="offer-216"></div>

<a href="laptop-detail.html?product=samsung">
<img src="el1.jpg" class="product-img">
</a>

<p class="product-name">Samsung A30s</p>

<p id="price-216">
    <span class="original-price">₹1999</span>
    <span class="final-price"></span>
</p>

<button class="cartbtn" onclick="addToCart(216,'Samsung A30s')">Add to Cart</button>
<button class="groupbuy" onclick="goToGroupBuyByData(216,'Samsung A30s',1999)">GroupBuy</button>
</div>

<!-- FAN -->
<div class="product-card">
<div class="discount-ribbon" id="offer-217"></div>

<a href="laptop-detail.html?product=fan">
<img src="fan1.jpg" class="product-img">
</a>

<p class="product-name">Usha Fan</p>

<p id="price-217">
    <span class="original-price">₹1499</span>
    <span class="final-price"></span>
</p>

<button class="cartbtn" onclick="addToCart(217,'Usha Fan')">Add to Cart</button>
<button class="groupbuy" onclick="goToGroupBuyByData(217,'Usha Fan',1499)">GroupBuy</button>
</div>

</div>

<script>

/* ---------------- LOGOUT ---------------- */

function logout(){
    const userId = localStorage.getItem("userId");

    localStorage.removeItem("group_" + userId);
    localStorage.removeItem("userId");

    window.location.href = "login.html";
}


/* ---------------- GROUP BUY ---------------- */

function goToGroupBuyByData(productId, productName, productPrice){

    const userId = localStorage.getItem("userId");

    let priceElement = document.getElementById("price-" + productId);

    let finalSpan = priceElement.querySelector(".final-price");

    let finalPrice = finalSpan.innerText
        ? Number(finalSpan.innerText.replace("₹",""))
        : productPrice;

    fetch("http://localhost:3000/create-group", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            productId,
            productName,
            productPrice: finalPrice
        })
    })
    .then(res => res.json())
    .then(data => {

        if(data.success){
            localStorage.setItem("group_" + userId, data.groupId);
            window.location.href = `group.html?groupId=${data.groupId}`;
        }
        else{
            alert("Group creation failed");
        }
    })
    .catch(() => alert("Server error"));
}


/* ---------------- ADD TO CART ---------------- */

function addToCart(id, name){

    let priceElement = document.getElementById("price-" + id);

    let originalSpan = priceElement.querySelector(".original-price");
    let finalSpan = priceElement.querySelector(".final-price");

    let originalPrice = Number(originalSpan.innerText.replace("₹",""));

    let finalPrice = finalSpan.innerText
        ? Number(finalSpan.innerText.replace("₹",""))
        : originalPrice;

    let discount = originalPrice - finalPrice;

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existing = cart.find(item => item.productId === Number(id));

    if(existing){
        existing.quantity += 1;
    } else {
        cart.push({
            productId: id,
            name: name,
            price: finalPrice,
            originalPrice: originalPrice,
            discount: discount,
            quantity: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    alert(name + " added to cart");
}


/* ---------------- DISTRICT OFFER ---------------- */

let userDistrict = localStorage.getItem("district");

let offers = {
    "Chennai": { type: "percentage", value: 10 },
    "Coimbatore": { type: "percentage", value: 30 },
    "Madurai": { type: "cash", value: 100 }
};

let districtOffer = offers[userDistrict];

[200,216,217].forEach(id => {

    let priceElement = document.getElementById("price-" + id);
    let ribbon = document.getElementById("offer-" + id);

    if(!priceElement) return;

    let originalSpan = priceElement.querySelector(".original-price");
    let finalSpan = priceElement.querySelector(".final-price");

    let originalPrice = Number(originalSpan.innerText.replace("₹",""));
    let finalPrice = originalPrice;

    if(districtOffer){

        if(districtOffer.type === "percentage"){
            finalPrice = originalPrice - (originalPrice * districtOffer.value / 100);
            ribbon.innerText = districtOffer.value + "% OFF";
        }

        if(districtOffer.type === "cash"){
            finalPrice = originalPrice - districtOffer.value;
            ribbon.innerText = "₹" + districtOffer.value + " OFF";
        }

        ribbon.style.display = "block";
    }

    finalSpan.innerText = "₹" + Math.round(finalPrice);

});


/* ---------------- MY GROUP ---------------- */

function openMyGroup(){

    const userId = localStorage.getItem("userId");
    const groupId = localStorage.getItem("group_" + userId);

    if(!groupId){
        alert("No active group");
        return;
    }

    window.location.href = `group.html?groupId=${groupId}`;
}


/* ---------------- SHOW/HIDE GROUP BUTTON ---------------- */

window.addEventListener("load", ()=>{

    const userId = localStorage.getItem("userId");
    const groupId = localStorage.getItem("group_" + userId);

    const btn = document.getElementById("myGroupBtn");

    if(groupId){
        btn.style.display = "block";
    } else {
        btn.style.display = "none";
    }

});

</script>

</body>
</html>
