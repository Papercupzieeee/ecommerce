<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link rel="stylesheet" href="checkout.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="header">
    <a href="homepage.html" class="logo">
        Groupcart <span>Plus ✦</span>
    </a>
    
    <div class="header-buttons">
        <button class="nav-btn" onclick="location.href='products.html'">Go Back</button>
        <button id="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">
    <div class="cart-header">
        <h2>My Cart (<span id="itemCount">0</span>)</h2>
    </div>

    <div id="cartItems"></div>

    <div class="summary-card">
        <div class="price-row">
            <span>Price Details</span>
        </div>
        <hr>
        <div class="price-row total-row">
            <span>Total Amount</span>
            <span id="total">₹0</span>
        </div>
        <p class="savings-text" id="totalSavings"></p>
    </div>

    <div class="actions">
        <button class="select-order-btn" onclick="placeSelectedOrders()">
            Place Order (Selected)
        </button>
        <button class="place-all-btn" onclick="placeAllOrders()">
            Place All Orders
        </button>
    </div>
    
    <div class="footer-action">
        <button class="orders-link" onclick="location.href='orders.html'">
            View Your Orders
        </button>
    </div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let cartDiv = document.getElementById("cartItems");

/* =========================
   RENDER CART
========================= */
function renderCart() {

    cartDiv.innerHTML = "";
    let total = 0;

    if(cart.length === 0){
        cartDiv.innerHTML = "<p>Your cart is empty</p>";
        document.getElementById("total").innerText = "";
        return;
    }

    cart.forEach((item, index) => {

        cartDiv.innerHTML += `
            <div class="cart-card">

                <input type="checkbox" class="select-item" data-index="${index}">

                <p><b>${item.name || "Product"}</b></p>

                <p>
                    <span style="text-decoration:line-through;color:gray;">
                        ₹${item.originalPrice || item.price}
                    </span>
                    <span style="color:green;font-weight:bold;">
                        ₹${item.price}
                    </span>
                </p>

                ${item.discount > 0 ? `
                    <p style="color:red;">You saved ₹${item.discount}</p>
                    <p style="color:blue;">District Offer Applied 🎉</p>
                ` : ""}

                <div class="qty">
                    <button onclick="decreaseQty(${index})">-</button>
                    <span>${item.quantity}</span>
                    <button onclick="increaseQty(${index})">+</button>
                </div>

                <button class="remove" onclick="removeItem(${index})">
                    Remove
                </button>

            </div>
        `;

        total += item.price * item.quantity;
    });

    document.getElementById("total").innerText = "Total: ₹" + total;
}

renderCart();

/* =========================
   QUANTITY
========================= */
function increaseQty(index) {
    cart[index].quantity++;
    saveCart();
}

function decreaseQty(index) {
    if (cart[index].quantity > 1) {
        cart[index].quantity--;
        saveCart();
    }
}

/* =========================
   REMOVE ITEM
========================= */
function removeItem(index) {
    cart.splice(index, 1);
    saveCart();
}

/* =========================
   SAVE CART
========================= */
function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

/* =========================
   PLACE ALL ORDERS
========================= */
function placeAllOrders() {

    const userId = localStorage.getItem("userId");

    if (!userId) {
        alert("Please login first!");
        return;
    }

    if (cart.length === 0) {
        alert("Cart is empty!");
        return;
    }

    const cartItems = cart.map(item => ({
        productId: item.productId,
        price: item.price,
        quantity: item.quantity
    }));

    fetch("https://ecommerce-backend-yx51.onrender.com/api/place-order", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
            userId, 
            cartItems,
            isGroupBuy: false
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.success) {
            alert("🎉 Order Placed Successfully!");
            localStorage.removeItem("cart");
            renderCart();
        } else {
            alert(data.message || "Order failed");
        }

    })
    .catch(() => alert("Server Error"));
}

/* =========================
   PLACE SELECTED ORDERS
========================= */
function placeSelectedOrders() {

    const userId = localStorage.getItem("userId");

    if (!userId) {
        alert("Please login first!");
        return;
    }

    const selected = document.querySelectorAll(".select-item:checked");

    if (selected.length === 0) {
        alert("Please select products!");
        return;
    }

    const cartItems = [];

    selected.forEach(cb => {
        const index = cb.dataset.index;
        const item = cart[index];

        cartItems.push({
            productId: item.productId,
            price: item.price,
            quantity: item.quantity
        });
    });

   fetch("https://ecommerce-backend-yx51.onrender.com/api/place-order", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
            userId, 
            cartItems,
            isGroupBuy: false   // ✅ FIXED
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.success) {
            alert("🎉 Selected Products Ordered!");

            cart = cart.filter((_, i) =>
                ![...selected].some(cb => cb.dataset.index == i)
            );

            saveCart();

        } else {
            alert(data.message || "Order failed");
        }

    })
    .catch(() => alert("Server Error"));
}

/* =========================
   LOGOUT
========================= */
function logout(){
    localStorage.clear();
    location.href = "login.html";
}

</script>

</body>
</html>
