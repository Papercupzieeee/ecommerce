<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link rel="stylesheet" href="checkout.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
</head>

<body>
    

<div class="header">
    <p class="logo"><span>G</span>roupcart</p>
    
    <div class="header-buttons">
        <button onclick="location.href='login.html'">Logout</button>
        <button onclick="location.href='products.html'">Go Back</button>
    </div>
    
</div>
<div class="trash-area">
    <div class="trash-bin" id="trashBin">
        🗑️
    </div>
</div>

<div class="container">
    <h2>Your Cart 🛒</h2>

    <div id="cartItems"></div>

    <div class="summary">
        <h3 id="total"></h3>
    </div>

    <div class="actions">

        <!-- Place All Orders -->
        <button class="place-all" onclick="placeAllOrders()">
            Place Order
        </button>

        <!-- Place Selected Orders -->
        <button class="select-order" onclick="placeSelectedOrders()">
            Select Your Products to Order
        </button>

        <button onclick="location.href='orders.html'">
            Your Orders
        </button>

    </div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let cartDiv = document.getElementById("cartItems");

function renderCart() {

    cartDiv.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {

        cartDiv.innerHTML += `
            <div class="cart-card">

                <input type="checkbox" class="select-item" data-index="${index}">

                <p><b>${item.name}</b></p>
                <span>₹${item.price}</span>

                <div class="qty">
                    <button onclick="decreaseQty(${index})">-</button>
                    <span>${item.quantity}</span>
                    <button onclick="increaseQty(${index})">+</button>
                </div>

                <button class="remove" onclick="removeItem(${index})">
                    Remove
                </button>

            </div>
        `;

        total += item.price * item.quantity;
    });

    document.getElementById("total").innerText = "Total: ₹" + total;
}

renderCart();


// Quantity Increase
function increaseQty(index) {
    cart[index].quantity++;
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

// Quantity Decrease
function decreaseQty(index) {
    if (cart[index].quantity > 1) {
        cart[index].quantity--;
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
    }
}

// Remove Item
function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}


// Place ALL Orders
function placeAllOrders() {

    let userId = localStorage.getItem("userId");

    if (!userId) {
        alert("Please login first!");
        return;
    }

    if (cart.length === 0) {
        alert("Cart is empty!");
        return;
    }

    let cartItems = cart.map(item => ({
        productId: item.productId,
        price: item.price,
        quantity: item.quantity
    }));

    fetch("http://localhost:3000/api/place-order", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId, cartItems })
    })
    .then(res => res.json())
    .then(data => {

        if (data.success) {
            alert("🎉 Order Placed Successfully!");
            localStorage.removeItem("cart");
            location.reload();
        } else {
            alert(data.message);
        }

    })
    .catch(() => alert("Server Error"));
}


// Place SELECTED Orders
function placeSelectedOrders() {

    let userId = localStorage.getItem("userId");

    if (!userId) {
        alert("Please login first!");
        return;
    }

    let selected = document.querySelectorAll(".select-item:checked");

    if (selected.length === 0) {
        alert("Please select products!");
        return;
    }

    let cartItems = [];

    selected.forEach(cb => {

        let index = cb.dataset.index;
        let item = cart[index];

        cartItems.push({
            productId: item.productId,
            price: item.price,
            quantity: item.quantity
        });

    });

    fetch("http://localhost:3000/api/place-order", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId, cartItems })
    })
    .then(res => res.json())
    .then(data => {

        if (data.success) {
            alert("🎉 Selected Products Ordered!");

            cart = cart.filter((_, i) =>
                ![...selected].some(cb => cb.dataset.index == i)
            );

            localStorage.setItem("cart", JSON.stringify(cart));
            renderCart();

        } else {
            alert(data.message);
        }

    })
    .catch(() => alert("Server Error"));
}



</script>

</body>
</html>
