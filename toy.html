<script>

/* ---------------- LOGOUT ---------------- */

function logout(){
    const userId = localStorage.getItem("userId");

    localStorage.removeItem("group_" + userId);
    localStorage.removeItem("userId");

    window.location.href = "login.html";
}


/* ---------------- GROUP BUY (FIXED) ---------------- */

function goToGroupBuyByData(productId, productName){

    const userId = localStorage.getItem("userId");

    if(!userId){
        alert("Login first");
        window.location.href = "login.html";
        return;
    }

    let priceElement = document.getElementById("price-" + productId);

    let originalPrice = Number(
        priceElement.querySelector(".original-price").innerText.replace("₹","")
    );

    let finalText = priceElement.querySelector(".final-price").innerText;

    let finalPrice = finalText
        ? Number(finalText.replace("₹",""))
        : originalPrice;

    const existingGroup = localStorage.getItem("group_" + userId);

    // 🔥 FIXED LOGIC
    if(existingGroup){

        fetch(`https://ecommerce-backend-yx51.onrender.com/group-status/${existingGroup}`)
        .then(res => res.json())
        .then(data => {

            // ❌ invalid / expired / success → clear & create new
            if(!data.success || data.group.status !== "pending"){
                localStorage.removeItem("group_" + userId);
                createGroup();
                return;
            }

            // ✅ still active → directly go (NO popup)
            window.location.href = `group.html?groupId=${existingGroup}`;

        })
        .catch(() => {
            localStorage.removeItem("group_" + userId);
            createGroup();
        });

        return;
    }

    // 👉 no group
    createGroup();


    function createGroup(){

        fetch("https://ecommerce-backend-yx51.onrender.com/create-group", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                productId,
                productName,
                productPrice: finalPrice,
                userId
            })
        })
        .then(res => res.json())
        .then(data => {

            if(data.success){
                localStorage.setItem("group_" + userId, data.groupId);
                window.location.href = `group.html?groupId=${data.groupId}`;
            } else {
                alert("Failed to create group");
            }

        })
        .catch(() => alert("Server error"));
    }
}



/* ---------------- ADD TO CART ---------------- */

function addToCart(id, name){

    let priceElement = document.getElementById("price-" + id);

    let originalSpan = priceElement.querySelector(".original-price");
    let finalSpan = priceElement.querySelector(".final-price");

    let originalPrice = Number(originalSpan.innerText.replace("₹",""));
    let finalPrice = finalSpan.innerText
        ? Number(finalSpan.innerText.replace("₹",""))
        : originalPrice;

    let discount = originalPrice - finalPrice;

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existing = cart.find(item => item.productId === Number(id));

    if(existing){
        existing.quantity += 1;
    } else {
        cart.push({
            productId: Number(id),
            name: name,
            price: finalPrice,
            originalPrice: originalPrice,
            discount: discount,
            quantity: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    alert(name + " added to cart 🛒");
}


/* ---------------- DISTRICT OFFER ---------------- */

let userDistrict = localStorage.getItem("district");

let offers = {
    "Chennai": { type: "percentage", value: 10 },
    "Coimbatore": { type: "percentage", value: 30 },
    "Madurai": { type: "cash", value: 100 }
};

let districtOffer = offers[userDistrict];

[205,206,207,208,209].forEach(id => {

    let priceElement = document.getElementById("price-" + id);
    let ribbon = document.getElementById("offer-" + id);

    let originalSpan = priceElement.querySelector(".original-price");
    let finalSpan = priceElement.querySelector(".final-price");

    let originalPrice = Number(originalSpan.innerText.replace("₹",""));
    let finalPrice = originalPrice;

    if(districtOffer){

        if(districtOffer.type === "percentage"){
            finalPrice = originalPrice - (originalPrice * districtOffer.value / 100);
            ribbon.innerText = districtOffer.value + "% OFF";
        }

        if(districtOffer.type === "cash"){
            finalPrice = originalPrice - districtOffer.value;
            ribbon.innerText = "₹" + districtOffer.value + " OFF";
        }

        ribbon.style.display = "block";
    }

    finalSpan.innerText = "₹" + Math.round(finalPrice);

});


/* ---------------- MY GROUP ---------------- */

function openMyGroup(){

    const userId = localStorage.getItem("userId");
    const groupId = localStorage.getItem("group_" + userId);

    if(!groupId){
        alert("No active group");
        return;
    }

    window.location.href = `group.html?groupId=${groupId}`;
}


/* ---------------- SHOW/HIDE GROUP BUTTON ---------------- */

window.addEventListener("load", ()=>{

    const userId = localStorage.getItem("userId");
    const groupId = localStorage.getItem("group_" + userId);

    const btn = document.getElementById("myGroupBtn");

    if(groupId){
        btn.style.display = "block";
    } else {
        btn.style.display = "none";
    }

});
</script>
