<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Toys - Groupcart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="products.css">
</head>

<body id="fourbody">

<div class="box4">
    <a href="homepage.html" class="text4a">
        Groupcart <span>Plus ✦</span>
    </a>
    <div class="header-btns">
        <button class="cart-btn" onclick="location.href='checkout.html'">Cart</button>
        <button id="myGroupBtn" onclick="openMyGroup()" style="display:none;">👥 Groups</button>
        <button id="logoutbtn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="box4d">
    <a href="products.html">Women</a>
    <a href="toy.html" style="color: #2874f0; border-bottom: 2px solid #2874f0;">Toys</a>
    <a href="shoes.html">Shoes</a>
    <a href="laptop.html">Laptops</a>
</div>

<div class="products-container">

    <div class="product-card">
        <a href="toy-detail.html?product=train">
            <img src="train1.jpg" class="product-img">
        </a>
        <p class="product-name">Remote Control High Speed Train</p>
        
        <div class="price-section">
            <p id="price-205">
                <span class="final-price"></span>
                <span class="original-price">₹899</span>
            </p>
            <div class="discount-ribbon" id="offer-205"></div>
        </div>

        <button class="cartbtn" onclick="addToCart(205,'Remote Train')">Add to Cart</button>
        <button class="groupbuy" onclick="goToGroupBuyByData(205,'Remote Train')">Group Buy</button>
    </div>

    <div class="product-card">
        <a href="toy-detail.html?product=water">
            <img src="watergun1.jpg" class="product-img">
        </a>
        <p class="product-name">Water Gun Super Soaker</p>
        
        <div class="price-section">
            <p id="price-206">
                <span class="final-price"></span>
                <span class="original-price">₹499</span>
            </p>
            <div class="discount-ribbon" id="offer-206"></div>
        </div>

        <button class="cartbtn" onclick="addToCart(206,'Water Gun')">Add to Cart</button>
        <button class="groupbuy" onclick="goToGroupBuyByData(206,'Water Gun')">Group Buy</button>
    </div>

    <div class="product-card">
        <a href="toy-detail.html?product=pine">
            <img src="pine1.jpg" class="product-img">
        </a>
        <p class="product-name">Pine Sponge Soft Toy</p>
        
        <div class="price-section">
            <p id="price-207">
                <span class="final-price"></span>
                <span class="original-price">₹99</span>
            </p>
            <div class="discount-ribbon" id="offer-207"></div>
        </div>

        <button class="cartbtn" onclick="addToCart(207,'Pine Sponge')">Add to Cart</button>
        <button class="groupbuy" onclick="goToGroupBuyByData(207,'Pine Sponge')">Group Buy</button>
    </div>

    <div class="product-card">
        <a href="toy-detail.html?product=iron">
            <img src="iron1.jpg" class="product-img">
        </a>
        <p class="product-name">Ironman Action Figure</p>
        
        <div class="price-section">
            <p id="price-208">
                <span class="final-price"></span>
                <span class="original-price">₹199</span>
            </p>
            <div class="discount-ribbon" id="offer-208"></div>
        </div>

        <button class="cartbtn" onclick="addToCart(208,'Ironman Toy')">Add to Cart</button>
        <button class="groupbuy" onclick="goToGroupBuyByData(208,'Ironman Toy')">Group Buy</button>
    </div>

</div>

<script>

/* ---------------- LOGOUT ---------------- */
function logout(){
    const userId = localStorage.getItem("userId");
    localStorage.removeItem("group_" + userId);
    localStorage.removeItem("userId");
    window.location.href = "index.html";
}

/* ---------------- GROUP BUY (FINAL FIXED) ---------------- */
function goToGroupBuyByData(productId, productName){

    const userId = localStorage.getItem("userId");

    if(!userId){
        alert("Login first");
        window.location.href = "index.html";
        return;
    }

    let priceElement = document.getElementById("price-" + productId);

    let originalPrice = Number(
        priceElement.querySelector(".original-price").innerText.replace("₹","")
    );

    let finalText = priceElement.querySelector(".final-price").innerText;

    let finalPrice = finalText
        ? Number(finalText.replace("₹",""))
        : originalPrice;

    const existingGroup = localStorage.getItem("group_" + userId);

    if(existingGroup){

        fetch(`https://ecommerce-backend-yx51.onrender.com/group-status/${existingGroup}`)
        .then(res => res.json())
        .then(data => {

            if(!data.success || data.group.status !== "pending"){
                localStorage.removeItem("group_" + userId);
                createGroup();
                return;
            }

            window.location.href = `group.html?groupId=${existingGroup}`;

        })
        .catch(() => {
            localStorage.removeItem("group_" + userId);
            createGroup();
        });

        return;
    }

    createGroup();


    function createGroup(){

        fetch("https://ecommerce-backend-yx51.onrender.com/create-group", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                productId,
                productName,
                productPrice: finalPrice,
                userId
            })
        })
        .then(res => res.json())
        .then(data => {

            if(data.success){
                localStorage.setItem("group_" + userId, data.groupId);
                window.location.href = `group.html?groupId=${data.groupId}`;
            } else {
                alert("Failed to create group");
            }

        })
        .catch(() => alert("Server error"));
    }
}

/* ---------------- ADD TO CART ---------------- */
function addToCart(id, name){

    let priceElement = document.getElementById("price-" + id);

    let originalPrice = Number(priceElement.querySelector(".original-price").innerText.replace("₹",""));
    let finalPrice = priceElement.querySelector(".final-price").innerText
        ? Number(priceElement.querySelector(".final-price").innerText.replace("₹",""))
        : originalPrice;

    let discount = originalPrice - finalPrice;

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existing = cart.find(item => item.productId === Number(id));

    if(existing){
        existing.quantity += 1;
    } else {
        cart.push({
            productId: Number(id),
            name,
            price: finalPrice,
            originalPrice,
            discount,
            quantity: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    alert(name + " added to cart 🛒");
}

/* ---------------- DISTRICT OFFER ---------------- */
let offers = {
    "Chennai": {type:"percentage", value:10},
    "Coimbatore": {type:"percentage", value:30},
    "Madurai": {type:"cash", value:100}
};

let userDistrict = localStorage.getItem("district");
let districtOffer = offers[userDistrict];

[205,206,207,208,209].forEach(id => {

    let priceElement = document.getElementById("price-" + id);
    let ribbon = document.getElementById("offer-" + id);

    let originalPrice = Number(priceElement.querySelector(".original-price").innerText.replace("₹",""));
    let finalPrice = originalPrice;

    if(districtOffer){

        if(districtOffer.type==="percentage"){
            finalPrice = originalPrice - (originalPrice * districtOffer.value / 100);
            ribbon.innerText = districtOffer.value + "% OFF";
        }

        if(districtOffer.type==="cash"){
            finalPrice = originalPrice - districtOffer.value;
            ribbon.innerText = "₹" + districtOffer.value + " OFF";
        }

        ribbon.style.display = "block";
    }

    priceElement.querySelector(".final-price").innerText = "₹" + Math.round(finalPrice);
});

/* ---------------- MY GROUP ---------------- */
function openMyGroup(){
    const userId = localStorage.getItem("userId");
    const groupId = localStorage.getItem("group_" + userId);

    if(!groupId){
        alert("No active group");
        return;
    }

    window.location.href = `group.html?groupId=${groupId}`;
}

/* ---------------- SHOW BUTTON ---------------- */
window.addEventListener("load", ()=>{
    const userId = localStorage.getItem("userId");
    const groupId = localStorage.getItem("group_" + userId);
    document.getElementById("myGroupBtn").style.display = groupId ? "block":"none";
});

</script>

</body>
</html>
