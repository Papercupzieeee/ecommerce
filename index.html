<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupcart - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    

    <div class="quantum-wrapper">
        <div class="brand-logo">
            Groupcart <span>Plus ✦</span>
        </div>
        <div class="header-section">
            <h1 class="main-title">Login</h1>
            <p class="sub-title">Get access to your Orders, Wishlist and Recommendations</p>
            <div class="delivery-container">
    <div class="road"></div>
    <div class="scooter">
        <i class="fa-solid fa-motorcycle"></i> </div>
</div>
        </div>

        <div class="login-panel">
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter Email" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" id="log">Login</button>
                
                <p style="text-align:center; color:#878787; font-size:14px; margin-top:20px;">OR</p>
                
                <button type="button" class="btn btn-secondary" id="sign" onclick="location.href='signup.html'">New to Groupcart? Create Account</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
