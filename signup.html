<html>
<link rel="stylesheet" href="styles.css">

<head>
<title>Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body id="twobody">


 
<form id="signupForm" class="form-container">
<p class="text2">
Signup<br>
start your purchasing here and get more offers and discounts
</p>

<div class="rope">
<input class="sg" type="email" id="email" placeholder="Enter your Email" required> <br>
</div>
<input class="sg" type="password" id="password" placeholder="Enter your Password" required> <br>

<select id="district" required>
<option value="">Select District</option>
<option value="Coimbatore">Coimbatore</option>
<option value="Chennai">Chennai</option>
<option value="Madurai">Madurai</option>
<option value="Salem">Salem</option>
<option value="Tiruchirappalli">Tiruchirappalli</option>
<option value="Tirunelveli">Tirunelveli</option>
<option value="Erode">Erode</option>
<option value="Vellore">Vellore</option>
<option value="Thoothukudi">Thoothukudi</option>
<option value="Dindigul">Dindigul</option>
<option value="Karur">Karur</option>
<option value="Ramanathapuram">Ramanathapuram</option>
<option value="Virudhunagar">Virudhunagar</option>
</select>

<br><br>

<button id="signup" type="submit">Signup</button>

<p class="text2b">Already have an Account? Login Here</p><br>

<button id="log" type="button" onclick="location.href='login.html'">
Login here
</button>

</form>

<script src="script.js"></script>

</body>
</html>
